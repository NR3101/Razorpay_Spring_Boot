services:
  postgres-db:
    image: postgres:18-alpine
    container_name: razorpay-postgres
    environment:
      - POSTGRES_DB=razorpay
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - razorpay-network
    restart: no

  redis-cache:
    image: redis:7.4-alpine
    container_name: razorpay-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - razorpay-network
    restart: no

networks:
  razorpay-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: