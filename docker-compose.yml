services:
  postgres-db:
    image: postgres:18-alpine
    container_name: razorpay-postgres
    environment:
      - POSTGRES_DB=razorpay
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: no

volumes:
  postgres_data: